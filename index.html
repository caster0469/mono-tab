<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mono Tab</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="background-grid" aria-hidden="true"></div>
    <div class="background-waves" aria-hidden="true"></div>

    <main class="shell" aria-label="Mono Tab home">
      <section class="center-panel" aria-label="時計と検索">
        <div class="clock" id="clock">00:00</div>
        <div class="date" id="date">----</div>

        <form class="search" id="searchForm" role="search">
          <span class="search-icon" aria-hidden="true">⌕</span>
          <input
            id="searchInput"
            type="text"
            autocomplete="off"
            spellcheck="false"
            placeholder="検索するか、URL を入力"
            aria-label="検索するか、URL を入力"
          />
        </form>

        <!-- Quick links are intentionally plain HTML so you can edit them easily. -->
        <nav class="quick-links" aria-label="クイックリンク">
          <a class="quick-link" href="https://www.youtube.com/">
            <span class="quick-icon">▶</span>
            <span>YouTube</span>
          </a>
          <a class="quick-link" href="https://chat.openai.com/">
            <span class="quick-icon">◎</span>
            <span>ChatGPT</span>
          </a>
          <a class="quick-link" href="https://github.com/">
            <span class="quick-icon">◆</span>
            <span>GitHub</span>
          </a>
          <a class="quick-link" href="https://mail.google.com/">
            <span class="quick-icon">✉</span>
            <span>Gmail</span>
          </a>
          <a class="quick-link" href="https://drive.google.com/">
            <span class="quick-icon">▲</span>
            <span>Drive</span>
          </a>
          <button class="quick-link add-link" type="button" aria-label="リンク追加（未実装）">
            <span class="quick-icon">＋</span>
            <span>追加</span>
          </button>
        </nav>
      </section>

      <aside class="card memo-card" aria-label="メモとTodo">
        <div class="card-header">
          <h2>MEMO</h2>
          <span aria-hidden="true">⌖</span>
        </div>

        <ul class="todo-list" id="todoList"></ul>

        <form class="todo-add" id="todoForm">
          <input id="todoInput" type="text" placeholder="Todo を追加..." aria-label="Todo を追加" />
          <button type="submit">＋</button>
        </form>

        <textarea id="memoText" rows="4" placeholder="メモを入力..." aria-label="自由入力メモ"></textarea>
      </aside>

      <aside class="card status-card" aria-label="ステータス">
        <div id="statusList" class="status-list"></div>
      </aside>

      <button class="settings-button" type="button" aria-label="設定（未実装）">⚙</button>
    </main>

    <script src="script.js"></script>
  </body>
</html>
