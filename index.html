<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mono Tab</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="background" aria-hidden="true"></div>

    <main class="wrapper" aria-label="Mono Tab">
      <section class="home" aria-label="時計、検索、クイックリンク">
        <time class="clock" id="clock" datetime="00:00">00:00</time>
        <div class="date" id="date">----年--月--日</div>

        <form class="search" id="searchForm" role="search">
          <span class="search-mark" aria-hidden="true">/</span>
          <input
            id="searchInput"
            type="text"
            autocomplete="off"
            spellcheck="false"
            placeholder="検索 or URL"
            aria-label="検索 or URL"
            autofocus
          />
        </form>

        <nav class="quick-links" aria-label="クイックリンク">
          <a class="quick-link" href="https://www.youtube.com/">YouTube</a>
          <a class="quick-link" href="https://chat.openai.com/">ChatGPT</a>
          <a class="quick-link" href="https://github.com/">GitHub</a>
          <a class="quick-link" href="https://mail.google.com/">Gmail</a>
          <a class="quick-link" href="https://drive.google.com/">Drive</a>
        </nav>
      </section>

      <button class="settings-button" type="button" aria-label="設定（未実装）">
        <span aria-hidden="true">⚙</span>
      </button>
    </main>

    <script src="script.js"></script>
  </body>
</html>
